<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Outer ring glow -->
  <circle cx="60" cy="60" r="54" stroke="#00ffff" stroke-width="1" stroke-dasharray="6 4" opacity="0.35"/>
  <!-- Middle ring -->
  <circle cx="60" cy="60" r="44" stroke="#00ffff" stroke-width="1.5" opacity="0.6"/>
  <!-- Core circle -->
  <circle cx="60" cy="60" r="32" fill="#1f1f1f" stroke="#00ffff" stroke-width="2"/>
  <!-- Inner glow circle -->
  <circle cx="60" cy="60" r="30" fill="url(#coreGrad)" opacity="0.9"/>
  <!-- Letter Z -->
  <path d="M44 46 L76 46 L44 74 L76 74" stroke="url(#zGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Orbit dot top -->
  <circle cx="60" cy="16" r="4" fill="#ff4173"/>
  <!-- Orbit dot right -->
  <circle cx="104" cy="60" r="3" fill="#28ff39"/>
  <!-- Orbit dot bottom-left -->
  <circle cx="25" cy="85" r="2.5" fill="#00ffff"/>
  <!-- Star sparkles -->
  <circle cx="90" cy="28" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="30" cy="40" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="95" cy="90" r="1.5" fill="#ffffff" opacity="0.5"/>
  <defs>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1f1f1f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="zGrad" x1="44" y1="46" x2="76" y2="74">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#ff4173"/>
    </linearGradient>
  </defs>
</svg>
